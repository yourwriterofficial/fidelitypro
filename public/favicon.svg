<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac" />
      <stop offset="50%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Rounded Square -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Accent Glow / Ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#textGrad)" stroke-width="8" opacity="0.3" />
  <!-- Central Text "RPM" -->
  <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="160" fill="url(#textGrad)" letter-spacing="-2" filter="url(#glow)">RPM</text>
  <!-- Tiny decorative dot -->
  <circle cx="256" cy="400" r="14" fill="#22c55e" />
</svg>